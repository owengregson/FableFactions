# Dependabot configuration.
#
# The shaded stack tracks current upstream releases; the downgrade legs normalize
# bytecode per Multi-Release tier and the verifyJdk8Api gate is the arbiter, so no
# dependency is held back for Java-8 compatibility. The remaining ignores are
# normative pins (compile API levels, the load-bearing downgrader version), not
# compatibility holds.

version: 2

updates:
  - package-ecosystem: gradle
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: build
    ignore:
      # Load-bearing pinned downgrader CLI (1.3.6) — verifyDowngrade and the leg
      # pipeline are calibrated to it; bump deliberately with a full matrix run.
      - dependency-name: 'xyz.wagyourtail.jvmdowngrader*'
      # JUnit 6 (Platform 6.x) is a deliberate migration, not an auto-bump; jqwik
      # tracks Platform 1.x and moves in lockstep with junit-bom.
      - dependency-name: 'org.junit:junit-bom'
        update-types: ['version-update:semver-major']
      - dependency-name: 'net.jqwik:jqwik'
        update-types: ['version-update:semver-major']
      # The Bukkit-facing COMPILE FLOOR is normatively 1.13.2 (ARCHITECTURE §3);
      # the whole 1.7.10-1.16.5 band is runtime-probed against it. Bumping the
      # floor artifact raises the compiled API surface (e.g. the 1.16 API adds
      # CommandSender#sendMessage(UUID, String[]) — a confirmed build break). A
      # floor change is a deliberate manual decision, never an auto-bump.
      - dependency-name: 'com.destroystokyo.paper:paper-api'
      # The MODERN/FOLIA compileOnly API pins (paper-folia 1.20.4, paper-modern
      # 1.20.6 — both this artifact) are the exact API levels :compat-folia and
      # :compat-modern compile against and FQN-load behind probes. An auto-bump to
      # a current build (e.g. 26.1.2) breaks compat compilation (confirmed CI
      # failure). Like the floor, a bump here is a deliberate manual decision.
      - dependency-name: 'io.papermc.paper:paper-api'
    groups:
      # Batch low-risk bumps for everything not ignored above.
      gradle-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: build
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
