# Live server integration matrix — boots real Paper/Spigot/Folia servers via
# run-paper with the shipped mega-jar + probe plugin and runs the live suites.
#
# NOTE: these lanes are beta-scoped best-effort (docs/ARCHITECTURE.md §7): the
# Gradle machinery and probe plugin ship with v1.0.0-beta.1, but per-entry
# enablement follows hardware/network availability. Lanes are NOT required
# status checks yet — ci.yml is the gating pipeline.
#
# Lane selection comes from support-matrix.json (the single source of truth):
#   - pull_request           → entries with "ci": "pr"   (the 5-lane smoke subset)
#   - workflow_dispatch      → "pr" subset, or ALL 18 entries when `full` is set
#   - schedule (nightly)     → ALL 18 entries

name: Integration

on:
  workflow_dispatch:
    inputs:
      full:
        description: 'Run the full 18-entry matrix (default: PR smoke subset)'
        type: boolean
        default: false
  schedule:
    # Nightly full matrix, 04:30 UTC (off the :00 rush).
    - cron: '30 4 * * *'
  pull_request:
    paths:
      # Runtime-behavior source trees (a docs/README change cannot alter a live boot).
      - 'core/src/**'
      - 'platform/src/**'
      - 'kernel/src/**'
      - 'compat/**'
      # The probe plugin IS the live suite driver.
      - 'probe/src/**'
      # Build files: any of these can change what jar the servers load.
      - '**/build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle/**'
      - 'support-matrix.json'
      - '.github/workflows/integration.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  matrix-prep:
    name: Select lanes from support-matrix.json
    # Guards: never run the scheduled matrix on forks; never run the heavy live
    # matrix for Dependabot PRs (a dependency bump is gated by ci.yml's build +
    # verifyJdk8Api Java-8 gate + unit/property suites — booting 5 real servers per
    # bump is wasted CI, and Dependabot's read-only token can't use the caches well).
    # `lane` needs this job, so skipping here skips the whole workflow.
    if: >-
      (github.event_name != 'schedule' || github.repository == 'owengregson/FableFactions')
      && github.actor != 'dependabot[bot]'
      && github.event.pull_request.head.repo.fork != true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.select.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          sparse-checkout: support-matrix.json
          sparse-checkout-cone-mode: false

      - name: Build lane matrix with jq
        id: select
        env:
          EVENT: ${{ github.event_name }}
          FULL: ${{ inputs.full }}
        run: |
          if [ "$EVENT" = "schedule" ] || { [ "$EVENT" = "workflow_dispatch" ] && [ "$FULL" = "true" ]; }; then
            FILTER='.entries[]'
          else
            FILTER='.entries[] | select(.ci == "pr")'
          fi
          # experimental defaults false; provisional legacy lanes (1.7.10/1.8.8 live boot,
          # UNCERTAIN until measured — see support-matrix _comment) carry it so their known
          # boot-uncertainty is visible but does not red this non-required workflow.
          MATRIX=$(jq -c "{include: [${FILTER} | {version, platform, jdk, experimental: (.experimental // false)}]}" support-matrix.json)
          echo "Selected lanes: $MATRIX"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  lane:
    name: ${{ matrix.platform }} ${{ matrix.version }} (JDK ${{ matrix.jdk }})
    needs: matrix-prep
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Provisional legacy live-boot lanes report but never red the workflow; modern
    # lanes (experimental=false) fail honestly.
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJSON(needs.matrix-prep.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Build JDK. The per-lane RUNTIME JDK (matrix.jdk) is auto-provisioned by
      # the foojay toolchain resolver into ~/.gradle/jdks and cached below.
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      - name: Cache provisioned toolchains (lane runtime JDK ${{ matrix.jdk }})
        uses: actions/cache@v6
        with:
          path: ~/.gradle/jdks
          key: ${{ runner.os }}-gradle-jdks-${{ matrix.jdk }}-${{ hashFiles('gradle/libs.versions.toml', 'settings.gradle.kts') }}

      # run-paper (xyz.jpenilla.run-task) downloads server jars into
      # ~/.gradle/caches/run-task-jars/<platform>/jars/<version>/ — outside
      # setup-gradle's cache scope, so cache it per platform+version.
      - name: Cache downloaded server jars
        uses: actions/cache@v6
        with:
          path: ~/.gradle/caches/run-task-jars
          key: run-task-jars-${{ matrix.platform }}-${{ matrix.version }}

      # Task naming (core/build.gradle.kts): runIntegrationTest + ('Folia_' for
      # folia lanes, '_' otherwise) + version with dots as underscores,
      # e.g. runIntegrationTest_1_20_6, runIntegrationTestFolia_26_1_2.
      # Clear any stale probe sentinel so the post-run assertion proves THIS boot ran
      # the probe (a crashed server never rewrites it, so a leftover file can't lie).
      - name: Clear stale probe results
        env:
          PLATFORM: ${{ matrix.platform }}
          VERSION: ${{ matrix.version }}
        run: rm -f "run/${PLATFORM}/${VERSION}/probe-results.txt"

      - name: Run integration lane
        env:
          PLATFORM: ${{ matrix.platform }}
          VERSION: ${{ matrix.version }}
        run: |
          SUFFIX="_${VERSION//./_}"
          if [ "$PLATFORM" = "folia" ]; then
            SUFFIX="Folia_${VERSION//./_}"
          fi
          echo "Running runIntegrationTest${SUFFIX}"
          ./gradlew "runIntegrationTest${SUFFIX}" --stacktrace

      # Backstop for false-green lanes. The run-task harness has been observed to
      # exit 0 even when the server DIES at boot (e.g. the PaperSpigot 1.7.10
      # timings NPE: Bukkit.getPluginManager() returns null inside
      # CustomTimingsHandler.startTiming during MinecraftServer boot). A server
      # that crashed on boot never actually exercised the plugin, so a "passing"
      # lane would be a lie. Fail the lane whenever the server log carries the
      # NMS/Bukkit fatal-crash signature. Runs regardless of the gradle exit code
      # so it catches the exit-0-but-crashed case. (The real fix belongs in the
      # gradle integration-test harness / probe; this is the observability guard
      # until that lands — and it is a no-op when the server booted cleanly.)
      # Truth check: a lane passes ONLY if the probe plugin actually booted inside the
      # server and reported allPassed. The run-task harness has been observed to exit 0
      # even when the server DIES at boot (e.g. the PaperSpigot 1.7.10 timings NPE:
      # Bukkit.getPluginManager() returns null in CustomTimingsHandler.startTiming during
      # MinecraftServer boot) — a crashed server never wrote probe-results.txt, so its
      # absence is a hard fail. Also scan the log for a fatal-crash signature. Runs
      # regardless of the gradle exit code so it catches the exit-0-but-crashed case.
      - name: Assert probe ran and passed (false-green backstop)
        if: ${{ !cancelled() }}
        env:
          PLATFORM: ${{ matrix.platform }}
          VERSION: ${{ matrix.version }}
        run: |
          RUN_DIR="run/${PLATFORM}/${VERSION}"
          RESULTS="${RUN_DIR}/probe-results.txt"
          LOG_DIR="${RUN_DIR}/logs"
          # 1) The probe sentinel must exist and report allPassed=true for THIS boot.
          if [ ! -f "$RESULTS" ]; then
            echo "::error::${RESULTS} is missing — the probe never ran (server crashed at boot or the plugin failed to enable). Lane did NOT pass."
            [ -d "$LOG_DIR" ] && { echo '--- last 60 log lines ---'; find "$LOG_DIR" -name '*.log' -exec tail -n 60 {} +; }
            exit 1
          fi
          echo "--- probe-results.txt ---"; cat "$RESULTS"
          if ! grep -q '^allPassed=true$' "$RESULTS"; then
            echo "::error::Probe reported failures for ${PLATFORM} ${VERSION} (allPassed != true)."
            exit 1
          fi
          # 2) Belt-and-suspenders: no fatal-crash signature in the server log.
          if [ -d "$LOG_DIR" ]; then
            PATTERN='Encountered an unexpected exception|Failed to start the minecraft server|This crash report has been saved|Exception (initializing|stopping) server'
            if grep -rIlE "$PATTERN" "$LOG_DIR" >/dev/null 2>&1; then
              echo "::error::Fatal server-crash signature in ${LOG_DIR} despite a probe result."
              grep -rInE "$PATTERN" "$LOG_DIR" | head -20 || true
              exit 1
            fi
          fi
          echo "Lane truly passed: probe booted, allPassed=true, no crash signature."

      - name: Upload server logs (failure only)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: server-logs-${{ matrix.platform }}-${{ matrix.version }}
          path: run/${{ matrix.platform }}/${{ matrix.version }}/logs
          retention-days: 7
