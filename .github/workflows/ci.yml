# FableFactions main pipeline: full build + every verification gate on one runner.
#
# `./gradlew build` runs the mega-jar assembly AND all seven verification gates
# (verifyDowngrade, verifyJdk8Api, verifyRelocation, verifyKernelPurity,
# verifyProbeIsolation, verifyDescriptorFloor, verifyNoStickyGetstatic) plus the
# unit/property/arch test suites — see core/build.gradle.kts `check` wiring.
# Live-server lanes live in integration.yml; they never gate this pipeline.

name: CI

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'

# One in-flight run per ref: a new push supersedes the previous run's answer.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; jobs that need more escalate locally.
permissions:
  contents: read

jobs:
  build:
    name: Build + verification gates
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Temurin 25 matches the build toolchain (max(jdk) in support-matrix.json),
      # so the foojay resolver skips a duplicate build-JDK download.
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      # main writes the Gradle cache, PRs only read it: no cache poisoning from
      # forks, no eviction churn from short-lived branches.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      # The verifyJdk8Api gate runs on a foojay-provisioned JDK 8 that lands in
      # ~/.gradle/jdks (outside setup-gradle's cache scope). Cache it so every
      # run does not re-download the gate toolchain.
      - name: Cache provisioned toolchains (JDK 8 gate)
        uses: actions/cache@v4
        with:
          path: ~/.gradle/jdks
          key: ${{ runner.os }}-gradle-jdks-${{ hashFiles('gradle/libs.versions.toml', 'settings.gradle.kts') }}

      - name: Build (mega-jar + all verification gates + tests)
        run: ./gradlew build --stacktrace

      - name: Upload plugin jar
        uses: actions/upload-artifact@v7
        with:
          name: FableFactions
          path: core/build/libs/FableFactions-*.jar
          if-no-files-found: error
          retention-days: 14

      - name: Upload test reports (failure only)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
          retention-days: 7

  # Feeds the GitHub dependency graph (Dependabot alerts / dependency review)
  # from the resolved Gradle graph. main-only and separate from `build` so it
  # never slows PR feedback.
  dependency-submission:
    name: Dependency graph submission
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@v4
