name: Feature request
description: Suggest a new feature or an improvement to an existing one.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing: check open issues and
        [Discussions](https://github.com/owengregson/FableFactions/discussions) for an
        existing request. Note that requests requiring new runtime dependencies or
        breaking the one-jar 1.7.10→26.1.2 support range face a high bar.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: >
        Describe the situation on your server that the current plugin doesn't handle,
        rather than jumping straight to a solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: >
        What should FableFactions do? Be concrete — commands, config keys, messages,
        permissions, GUI changes.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: >
        Other ways to solve the problem — existing config options, other plugins, a
        different design — and why they fall short.
