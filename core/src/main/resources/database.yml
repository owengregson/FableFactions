# ─────────────────────────────────────────────────────────────────────────────
#  FableFactions — storage configuration
#
#  Changes require a full restart (the connection pool is opened once at boot).
#
#  type: hsqldb -> embedded file database (MySQL-compatible mode), zero setup.
#  type: mysql  -> remote MySQL / MariaDB.
# ─────────────────────────────────────────────────────────────────────────────

type: hsqldb

hsqldb:
  # Path relative to the plugin data folder.
  file: data/factions

mysql:
  host: localhost
  port: 3306
  database: factions
  username: root
  password: ""
  pool-size: 10

debug:
  # Print every SQL statement (needs an SLF4J provider). Keep false in production.
  sql-logging: false
